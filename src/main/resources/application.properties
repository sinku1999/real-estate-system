spring.application.name=estateflow

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL}


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/uploads}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# RAZORPAY
# ===============================
razorpay.key=${RAZORPAY_KEY}
razorpay.secret=${RAZORPAY_SECRET}

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true