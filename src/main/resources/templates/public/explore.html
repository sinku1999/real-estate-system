<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Explore Properties | EstateFlow</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/favicon.png}">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/images/favicon.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container py-5">

    <!-- 🔥 HEADER -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">Explore Premium Properties</h1>
        <p class="text-muted">Find your dream home with verified listings</p>
    </div>

    <!-- 🔍 SEARCH -->
    <form method="get" action="/explore" class="mb-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <input type="text" name="keyword" th:value="${keyword}"
                       class="form-control form-control-lg rounded-3"
                       placeholder="Search by property name...">
            </div>
            <div class="col-md-2">
                <button class="btn btn-dark w-100 rounded-3">Search</button>
            </div>
        </div>
    </form>

    <!-- 🏠 PROPERTY GRID -->
    <div class="row g-4">

        <div class="col-md-4" th:each="p : ${properties}">
            <a th:href="@{/property/{id}(id=${p.id})}" class="text-decoration-none text-dark">

                <div class="card shadow-sm border-0 rounded-4 h-100 property-card">

                    <!-- IMAGE -->
                    <img th:if="${p.imagePath != null}" th:src="@{${p.imagePath}}"
                         class="card-img-top rounded-top-4" style="height:220px; object-fit:cover;">

                    <!-- CONTENT -->
                    <div class="card-body">

                        <h5 class="fw-bold" th:text="${p.name}">Property Name</h5>

                        <p class="text-muted small" th:text="${p.location.name}">Location</p>

                        <p class="small" th:text="${p.description}">Description</p>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="fw-bold text-success"
                                  th:text="${p.pgListing ? 'Dynamic Price' : '₹' + p.price}">
                                ₹50000
                            </span>

                            <span class="badge bg-primary"
                                  th:text="${p.listingType}">
                                SALE
                            </span>
                        </div>

                    </div>

                </div>

            </a>
        </div>

    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(properties)}" class="text-center mt-5">
        <h4>No properties found</h4>
        <p class="text-muted">Try different search</p>
    </div>

</div>

</body>
</html>
