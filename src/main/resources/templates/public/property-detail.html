<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Property Detail | EstateFlow</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/favicon.png}">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/images/favicon.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container py-5">

    <!-- 🔥 IMAGE + HERO -->
    <div class="row g-4 align-items-center">

        <div class="col-md-6">
            <img th:src="@{${property.imagePath}}"
                 class="img-fluid rounded-4 shadow-lg">
        </div>

        <div class="col-md-6">

            <h2 class="fw-bold mb-3" th:text="${property.name}"></h2>

            <p class="text-muted" th:text="${property.location.name}"></p>

            <h3 class="text-success fw-bold mb-3"
                th:text="${property.pgListing ? 'Dynamic Pricing' : '₹' + property.price}">
            </h3>

            <p th:text="${property.description}"></p>

            <!-- DETAILS -->
            <div class="mt-4">

                <div><strong>Type:</strong> <span th:text="${property.propertyType}"></span></div>
                <div><strong>BHK:</strong> <span th:text="${property.bhk}"></span></div>
                <div><strong>Size:</strong> <span th:text="${property.sizeSqFt} + ' sq ft'"></span></div>
                <div><strong>Address:</strong> <span th:text="${property.address}"></span></div>

            </div>

            <!-- ACTION BUTTONS -->
            <div class="mt-4 d-flex gap-3">

                <!-- SALE -->
                <form method="post" action="/inquiry"
                      th:if="${property.listingType.name() == 'SALE'}">

                    <input type="hidden" name="propertyId" th:value="${property.id}">

                    <input type="number" name="amount"
                           class="form-control mb-2"
                           placeholder="Your Offer Amount">

                    <textarea name="message"
                              class="form-control mb-2"
                              placeholder="Your message"></textarea>

                    <button class="btn btn-dark w-100">
                        💬 Send Inquiry
                    </button>

                </form>

                <!-- RENT -->
                <button class="btn btn-success px-4"
                        th:if="${property.listingType.name() == 'RENT'}">
                    Book Now
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
