<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('Property Review | EstateFlow')}"></head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar('properties')}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/topbar :: topbar('Property Review', 'Approve or reject listings with powerful admin controls', 'Admin Panel')}"></div>

        <section class="admin-page-hero">
            <div class="admin-page-hero-content">
                <div class="hero-badge">Approval Engine</div>
                <h2>Review and control property quality</h2>
                <p>
                    Ensure only high-quality listings go live.
                </p>
            </div>

            <div class="hero-side-actions">
                <a th:href="@{/admin/dashboard}" class="btn-theme">Dashboard</a>
                <a th:href="@{/admin/locations}" class="btn-accent">Locations</a>
            </div>
        </section>

        <div th:if="${param.success != null}">
            <div th:if="${param.success[0] == 'approved'}">Approved</div>
            <div th:if="${param.success[0] == 'rejected'}">Rejected</div>
        </div>

        <!-- PROPERTY LIST -->
        <div th:if="${!#lists.isEmpty(properties)}" class="property-grid mt-3">

            <div class="property-card" th:each="property : ${properties}">

                <!-- IMAGE -->
                <div class="property-image-wrap">

                    <!-- ✅ FIXED IMAGE -->
                    <img th:if="${property.imageUrl != null and !property.imageUrl.isEmpty()}"
                         th:src="${property.imageUrl}"
                         alt="Property Image"
                         style="width:100%; height:200px; object-fit:cover; border-radius:12px;" />

                    <!-- FALLBACK -->
                    <div th:if="${property.imageUrl == null or property.imageUrl.isEmpty()}"
                         class="property-image-placeholder">
                        No Image
                    </div>

                </div>

                <!-- DETAILS -->
                <div class="property-card-body">

                    <h4 th:text="${property.name}"></h4>

                    <p th:text="${property.location != null ? property.location.name : 'Location not available'}"></p>

                    <p th:text="${property.description}"></p>

                    <div>
                        Owner:
                        <span th:text="${property.owner != null ? property.owner.firstName : 'N/A'}"></span>
                    </div>

                    <div>
                        ₹<span th:text="${property.price}"></span>
                    </div>

                    <div th:if="${property.status.name() == 'PENDING'}">
                        <a th:href="@{/admin/properties/approve/{id}(id=${property.id})}">Approve</a>
                        <a th:href="@{/admin/properties/reject/{id}(id=${property.id})}">Reject</a>
                    </div>

                </div>

            </div>

        </div>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(properties)}">
            <h4>No properties found</h4>
        </div>

    </main>
</div>

</body>
</html>
