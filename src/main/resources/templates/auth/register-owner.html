<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Owner | EstateFlow</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/favicon.png}">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/images/favicon.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <h2 class="auth-title">Become Property Owner 🏡</h2>
        <p class="auth-subtitle">List your properties with EstateFlow</p>

        <form th:action="@{/register/owner}" th:object="${userDto}" method="post">

            <!-- FIRST NAME -->
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control" required>
                <small class="text-danger"
                       th:if="${#fields.hasErrors('firstName')}"
                       th:errors="*{firstName}"></small>
            </div>

            <!-- LAST NAME -->
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control">
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
                <small class="text-danger"
                       th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"></small>
            </div>

            <!-- CONTACT -->
            <div class="mb-3">
                <label class="form-label">Contact Number</label>
                <input type="text" th:field="*{contactNo}" class="form-control" required>
                <small class="text-danger"
                       th:if="${#fields.hasErrors('contactNo')}"
                       th:errors="*{contactNo}"></small>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
                <small class="text-danger"
                       th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"></small>
            </div>

            <button type="submit" class="btn-accent w-100 mt-2">
                Register as Owner
            </button>

        </form>

        <div th:if="${successMessage}" class="alert alert-success mt-3" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger mt-3" th:text="${errorMessage}"></div>

        <div class="auth-footer-link mt-3">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </div>

    </div>
</div>

</body>
</html>
