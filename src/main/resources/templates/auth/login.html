<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | EstateFlow</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/favicon.png}">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/images/favicon.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">Welcome Back 👋</h2>
        <p class="auth-subtitle">Login to your EstateFlow account</p>

        <!-- ERROR MESSAGE -->
        <div th:if="${param.error}" class="alert-custom-danger">
            Invalid email or password
        </div>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${param.logout}" class="alert-custom-success">
            Logged out successfully
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-theme w-100 mt-2">Login</button>

        </form>

        <div class="auth-footer-link mt-3">
            Don’t have an account?
            <a th:href="@{/register/customer}">Register as Customer</a>
        </div>

    </div>

</div>

</body>
</html>
