<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('Property Details | EstateFlow')}"></head>

<body>

<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: customer-sidebar('explore')}"></div>

    <main class="main-content"
          th:with="isPg=${(property.propertyType != null and property.propertyType.name() == 'PG') or property.pgListing == true}">

        <div th:replace="~{fragments/topbar :: topbar('Property Details', 'Inspect the listing carefully and move forward with confidence', 'Customer Panel')}"></div>

        <section class="admin-page-hero compact-hero">
            <div class="admin-page-hero-content">
                <div class="hero-badge">Property Details</div>
                <h2 th:text="${property.name}">Property Name</h2>
            </div>

            <div class="hero-side-actions">
                <a th:href="@{/explore}" class="btn-theme">Back to Explore</a>
                <a th:href="@{/customer/inquiries}" class="btn-accent">My Inquiries</a>
            </div>
        </section>

        <div class="row g-4">

            <div class="col-lg-7">
                <div class="content-card admin-glass-card property-detail-hero-card">

                    <div class="property-detail-image-wrap">
                        <img th:if="${property.imagePath != null and !property.imagePath.isEmpty()}"
                             th:src="${property.imagePath}"
                             class="property-detail-main-image"
                             alt="Property Image">

                        <div th:if="${property.imagePath == null or property.imagePath.isEmpty()}"
                             class="property-image-placeholder property-detail-placeholder">
                            No Image Available
                        </div>

                        <div class="property-badges">

                            <span class="status-badge success-badge"
                                  th:if="${property.listingType != null and property.listingType.name() == 'RENT' and !isPg}">
                                Rent
                            </span>

                            <span class="status-badge accent-badge"
                                  th:if="${property.listingType != null and property.listingType.name() == 'SALE'}">
                                Sale
                            </span>

                            <span class="status-badge warning-badge"
                                  th:if="${isPg}">
                                PG
                            </span>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-lg-5">
                <div class="content-card admin-glass-card property-detail-side-card">

                    <div class="property-detail-price-box">
                        <span class="info-label" th:text="${isPg ? 'Monthly Price' : 'Price'}">Price</span>
                        <h2>
                            ₹<span th:text="${property.price != null ? #numbers.formatDecimal(property.price, 0, 'COMMA', 0, 'POINT') : '0'}"></span>
                        </h2>
                    </div>

                    <div class="property-info-stack mt-4">
                        <div class="property-detail-row">
                            <span>Location</span>
                            <strong th:text="${property.location != null ? property.location.name : 'Location not available'}"></strong>
                        </div>

                        <div class="property-detail-row">
                            <span>Property Type</span>
                            <strong th:text="${property.propertyType}"></strong>
                        </div>

                        <div class="property-detail-row">
                            <span>Listing Type</span>
                            <strong th:text="${property.listingType}"></strong>
                        </div>

                        <div class="property-detail-row">
                            <span>PG Listing</span>
                            <strong th:text="${isPg ? 'Yes' : 'No'}"></strong>
                        </div>
                    </div>

                    <div class="property-description-box mt-4">
                        <span class="info-label">Description</span>
                        <p th:text="${property.description != null and !#strings.isEmpty(property.description) ? property.description : 'No description available'}"></p>
                    </div>

                    <div class="d-grid gap-2 mt-4">

                        <!-- SALE -->
                        <button type="button"
                                th:if="${property.listingType != null and property.listingType.name() == 'SALE'}"
                                class="btn-accent"
                                data-bs-toggle="modal"
                                data-bs-target="#inquiryModal">
                            Inquire Now
                        </button>

                        <!-- PG -->
                        <a th:if="${isPg}"
                           th:href="@{'/customer/property/' + ${property.id} + '/rooms'}"
                           class="btn-theme">
                            Book PG
                        </a>

                        <!-- NORMAL RENT -->
                        <a th:if="${property.listingType != null and property.listingType.name() == 'RENT' and !isPg}"
                           th:href="@{'/customer/property/' + ${property.id} + '/book'}"
                           class="btn-theme">
                            Book Property
                        </a>

                        <a th:href="@{/explore}" class="btn-light-soft">
                            Back to Listings
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </main>
</div>

<div class="modal fade" id="inquiryModal" tabindex="-1" aria-labelledby="inquiryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 22px; border: 1px solid #e7dccb;">
            <div class="modal-header">
                <h5 class="modal-title" id="inquiryModalLabel">Send Inquiry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form th:action="@{/inquiry}" method="post">
                <div class="modal-body">
                    <input type="hidden" name="propertyId" th:value="${property.id}"/>

                    <div class="mb-3">
                        <label class="form-label">Offer Amount</label>
                        <input type="number" name="amount" class="form-control premium-input" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" class="form-control premium-input" rows="4" required></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-light-soft" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-accent">Submit Inquiry</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
