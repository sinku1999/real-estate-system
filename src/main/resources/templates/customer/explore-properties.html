<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('Explore Properties | EstateFlow')}"></head>

<body>

<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: customer-sidebar('explore')}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/topbar :: topbar('Explore Properties', 'Find and compare listings with a premium browsing experience', 'Customer Panel')}"></div>

        <section class="admin-page-hero compact-hero">
            <div class="admin-page-hero-content">
                <div class="hero-badge">Property Explorer</div>
                <h2>Discover your next home with confidence</h2>
                <p>
                    Compare listings, inspect pricing, and move smoothly from browsing to inquiry.
                </p>
            </div>

            <div class="hero-side-actions">
                <a th:href="@{/customer/dashboard}" class="btn-theme">Dashboard</a>
                <a th:href="@{/customer/inquiries}" class="btn-accent">My Inquiries</a>
            </div>
        </section>

        <!-- SEARCH -->
        <div class="content-card mb-4">
            <form method="get" class="row g-3">

                <div class="col-md-5">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Search property..."
                           th:value="${param.keyword}">
                </div>

                <div class="col-md-4">
                    <select name="location" class="form-select">
                        <option value="">All Locations</option>

                        <option th:each="loc : ${locations}"
                                th:value="${loc.name}"
                                th:text="${loc.name}"
                                th:selected="${param.location != null and param.location[0] == loc.name}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3 d-grid">
                    <button class="btn-theme">Search</button>
                </div>

            </form>
        </div>

        <!-- STATS -->
        <div class="dashboard-grid mb-4">
            <div class="stat-card">
                <h4>Total Listings</h4>
                <h2 th:text="${#lists.size(properties)}">0</h2>
            </div>

            <div class="stat-card">
                <h4>With Images</h4>
                <h2 th:text="${#lists.size(properties.?[imageUrl != null and !imageUrl.isEmpty()])}">0</h2>
            </div>

            <div class="stat-card">
                <h4>No Image</h4>
                <h2 th:text="${#lists.size(properties.?[imageUrl == null or imageUrl.isEmpty()])}">0</h2>
            </div>
        </div>

        <!-- PROPERTY LIST -->
        <div class="property-grid">

            <div th:each="property : ${properties}" class="property-card">

                <!-- IMAGE -->
                <div class="property-image-wrap">

                    <!-- ✅ FIXED IMAGE -->
                    <img th:if="${property.imageUrl != null and !property.imageUrl.isEmpty()}"
                         th:src="${property.imageUrl}"
                         alt="Property Image"
                         style="width:100%; height:200px; object-fit:cover; border-radius:12px;" />

                    <!-- FALLBACK -->
                    <div th:if="${property.imageUrl == null or property.imageUrl.isEmpty()}"
                         class="property-image-placeholder">
                        No Image
                    </div>

                </div>

                <!-- DETAILS -->
                <div class="property-card-body">

                    <h5 th:text="${property.name}">Property</h5>

                    <p th:text="${property.location != null ? property.location.name : 'Location not available'}"></p>

                    <p th:text="${property.description != null ? property.description : 'No description'}"></p>

                    <div>
                        ₹<span th:text="${property.price}"></span>
                    </div>

                    <div class="mt-2">
                        <a th:href="@{'/property/' + ${property.id}}"
                           class="btn-accent">
                            View Details
                        </a>
                    </div>

                </div>

            </div>

        </div>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(properties)}" class="text-center mt-4">
            <h4>No Properties Found</h4>
            <p>Try different filters</p>
        </div>

    </main>

</div>

</body>
</html>
