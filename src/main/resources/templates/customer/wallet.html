<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('Wallet | EstateFlow')}"></head>

<body>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: customer-sidebar('wallet')}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/topbar :: topbar('Wallet', 'Manage your balance and add funds securely', 'Customer Panel')}"></div>

        <section class="customer-hero">
            <div class="customer-hero-content">
                <h1>Wallet</h1>
                <p>Add money securely using Razorpay</p>
            </div>
        </section>

        <div class="dashboard-grid">

            <div class="stat-card">
                <h4>Balance</h4>
                <h2>₹<span th:text="${user.wallet}">0</span></h2>

                <input type="number" id="amount" class="form-control mt-2" placeholder="Enter amount">

                <button class="btn-accent mt-2" onclick="payCustom()">Add Money</button>
            </div>

        </div>

    </main>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    function payCustom() {
        const amount = document.getElementById("amount").value;

        if (!amount || amount <= 0) {
            alert("Enter valid amount");
            return;
        }

        fetch("/create-order?amount=" + amount, {
            method: "POST"
        })
        .then(res => res.json())
        .then(order => {

            const options = {
                key: order.key,   // ✅ FIXED (IMPORTANT)
                amount: order.amount,
                currency: order.currency,
                order_id: order.id,

                name: "EstateFlow",
                description: "Wallet Recharge",

                handler: function (response) {

                    fetch("/verify-payment", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body:
                            "razorpay_payment_id=" + response.razorpay_payment_id +
                            "&razorpay_order_id=" + response.razorpay_order_id +
                            "&razorpay_signature=" + response.razorpay_signature +
                            "&amount=" + amount
                    })
                    .then(res => res.text())
                    .then(() => {
                        alert("Payment Successful");
                        location.reload();
                    });
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        })
        .catch(() => {
            alert("Payment failed to start");
        });
    }
</script>

</body>
</html>
